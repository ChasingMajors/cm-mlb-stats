name: Update MLB Stats

on:
  schedule:
    - cron: "17 9 * * *"   # 3:17 AM Denver
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - run: npm install
      - run: node src/build.js

      - name: Commit JSON
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "daily stats update" || echo "no changes"
          git push
